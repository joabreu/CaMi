version: "3.8"

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_HOST=n8n
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_RESTRICT_FILE_ACCESS_TO=/files
      - DB_SQLITE_POOL_SIZE=4
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_PRUNE_MAX_AGE=72
      - EXECUTIONS_DATA_PRUNE_TIMEOUT=3600
    volumes:
      - n8n_data:/home/node/.n8n
      - n8n_files:/files:Z
  wwebjs-api:
    image: avoylenko/wwebjs-api:latest
    container_name: wwebjs-api
    restart: always
    ports:
      - "3000:3000"
    environment:
      # URL where the container can reach n8n internally
      - BASE_WEBHOOK_URL=http://n8n:5678/webhook/whatsapp-in
    volumes:
      - wweb_data:/usr/src/app/sessions
    depends_on:
      - n8n

volumes:
  n8n_data:
  n8n_files:
  wweb_data: